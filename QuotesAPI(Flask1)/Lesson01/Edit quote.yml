info:
  name: Edit quote
  type: http
  seq: 6

http:
  method: PUT
  url: 127.0.0.1:5000/quotes/1
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
          "text": "Отредактированная цитата. Имя автора должно остаться прежним"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Редактирование цитаты с указанным id
  Если цитата с указаннм id не существует, то создаем новую
